<!DOCTYPE html>
<html>
<head>
    <title>Spicy Shrimp Ramen Bowls - Purely Yum</title>
</head>
<body>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Recipe",
      "name": "Spicy Shrimp Ramen Bowls",
      "description": "Flavorful and quick meal",
      "recipeIngredient": [
        "8 oz ramen noodles",
        "1 lb shrimp, peeled and deveined",
        "4 cups chicken or vegetable broth",
        "2 tablespoons soy sauce",
        "1 tablespoon sriracha",
        "1 tablespoon sesame oil",
        "2 cloves garlic, minced",
        "1 inch fresh ginger, grated",
        "1 cup bok choy, roughly chopped",
        "1 cup fresh bean sprouts",
        "2 green onions thinly sliced",
        "1 tablespoon toasted sesame seeds",
        "to taste  salt",
        "to taste  freshly ground black pepper",
        "for serving  lime wedges"
      ],
      "recipeInstructions": [
        {
          "@type": "HowToStep",
          "text": "Cook the ramen noodles according to package instructions. Drain and set aside."
        },
        {
          "@type": "HowToStep",
          "text": "In a large pot, heat the sesame oil over medium heat. Add the garlic and ginger, and sauté until fragrant."
        },
        {
          "@type": "HowToStep",
          "text": "Add the shrimp and cook until pink and opaque."
        },
        {
          "@type": "HowToStep",
          "text": "Pour in the broth, soy sauce, and sriracha. Bring to a simmer."
        },
        {
          "@type": "HowToStep",
          "text": "Add the bok choy and bean sprouts. Cook for 2-3 minutes until the vegetables are tender."
        },
        {
          "@type": "HowToStep",
          "text": "Divide the noodles among bowls. Pour the shrimp and broth over the noodles."
        },
        {
          "@type": "HowToStep",
          "text": "Garnish with green onions, sesame seeds, and lime wedges. Serve immediately."
        }
      ],
      "recipeYield": "4 servings",
      "prepTime": "PT15M",
      "cookTime": "PT15M",
      "totalTime": "PT30M"
    }
    </script>
</body>
</html>

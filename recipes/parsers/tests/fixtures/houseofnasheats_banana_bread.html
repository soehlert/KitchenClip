<!DOCTYPE html>
<html>
<head>
    <title>One-Bowl Easy Banana Bread - House of Nash Eats</title>
</head>
<body>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Recipe",
          "name": "Best Easy Banana Bread Recipe",
          "description": "Super moist, EASY, and delicious, this is the Best Banana Bread recipe ever! It’s our favorite way to use up overripe bananas and it freezes really well too!",
          "recipeIngredient": [
            "3-4  ripe bananas ((about 2 cups mashed))",
            "1/3 cup salted butter (melted)",
            "3/4 cup (150g) granulated sugar",
            "1  large egg (beaten)",
            "1 teaspoon pure vanilla extract",
            "1 teaspoon baking soda",
            "1 teaspoon baking powder",
            "1/4 teaspoon ground cinnamon",
            "1/8 teaspoon salt",
            "1 1/2 cups (212g) all-purpose flour",
            "1 cup chopped walnuts (or chocolate chips, plus extra for topping if desired)"
          ],
          "recipeInstructions": [
            {
              "@type": "HowToStep",
              "text": "Preheat oven to 350℉ (177℃). Lightly grease and flour an 8.5x4.5-inch loaf pan or spray with baking spray."
            },
            {
              "@type": "HowToStep",
              "text": "In a large bowl, mash the ripe bananas with a fork until mostly smooth."
            },
            {
              "@type": "HowToStep",
              "text": "Stir the melted butter into the mashed bananas."
            },
            {
              "@type": "HowToStep",
              "text": "Mix in the sugar, egg, and vanilla extract."
            },
            {
              "@type": "HowToStep",
              "text": "Sprinkle the baking soda, baking powder, cinnamon, and salt over the mixture and stir to combine."
            },
            {
              "@type": "HowToStep",
              "text": "Add the flour and stir just until combined. Do not overmix."
            },
            {
              "@type": "HowToStep",
              "text": "Fold in the walnuts or chocolate chips if using."
            },
            {
              "@type": "HowToStep",
              "text": "Pour the batter into the prepared loaf pan and bake for 50-60 minutes, or until a toothpick inserted into the center comes out clean."
            },
            {
              "@type": "HowToStep",
              "text": "Let cool in the pan for 10 minutes, then transfer to a wire rack to cool completely."
            }
          ],
          "recipeYield": "1 loaf",
          "prepTime": "PT15M",
          "cookTime": "PT55M",
          "totalTime": "PT70M",
          "image": [
            "https://houseofnasheats.com/wp-content/uploads/2025/05/Banana-Bread-Square.jpg"
          ]
        }
      ]
    }
    </script>
</body>
</html>

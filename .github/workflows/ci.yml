name: Django CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
      DJANGO_SECRET_KEY: "dummy-key-for-github-actions"
      ENABLE_COOKING_NOTIFICATIONS: "False"

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: "pyproject.toml"

    - name: Install System Dependencies for lxml
      run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt1-dev python3-dev

    - name: Install Dependencies
      run: uv sync --dev

    - name: Install Playwright Browsers
      run: uv run playwright install --with-deps chromium

    - name: Run Ruff Linter
      run: uv run ruff check .

    - name: Run Django Tests
      run: uv run pytest

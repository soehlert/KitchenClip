services:
  web:
    image: ghcr.io/soehlert/kitchenclip:latest
    ports:
      - "8888:8000"
    env_file:
      - .env
    environment:
      - DJANGO_ALLOWED_HOSTS=*
      - PYTHONWARNINGS=ignore:invalid escape sequence:SyntaxWarning
    volumes:
      - ./recipes:/app/recipes
      - ./KitchenClip:/app/KitchenClip
      - ./templates:/app/templates
      - ./manage.py:/app/manage.py
      - ./db.sqlite3:/app/data/db.sqlite3
      - ./static:/app/static
      - ./pyproject.toml:/app/pyproject.toml
    restart: unless-stopped

  redis:
    image: "redis:alpine"
    restart: unless-stopped

  celery_worker:
    image: ghcr.io/soehlert/kitchenclip:latest
    command: celery -A KitchenClip worker -l info
    depends_on:
      - redis
    volumes:
      - ./recipes:/app/recipes
      - ./KitchenClip:/app/KitchenClip
      - ./templates:/app/templates
      - ./manage.py:/app/manage.py
      - ./db.sqlite3:/app/data/db.sqlite3
      - ./pyproject.toml:/app/pyproject.toml
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    restart: unless-stopped

  celery_beat:
    image: ghcr.io/soehlert/kitchenclip:latest
    command: celery -A KitchenClip beat -l info
    depends_on:
      - redis
    volumes:
      - ./recipes:/app/recipes
      - ./KitchenClip:/app/KitchenClip
      - ./templates:/app/templates
      - ./manage.py:/app/manage.py
      - ./db.sqlite3:/app/data/db.sqlite3
      - ./pyproject.toml:/app/pyproject.toml
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    restart: unless-stopped

  flower:
    image: ghcr.io/soehlert/kitchenclip:latest
    command: celery -A KitchenClip flower --port=5566
    ports:
      - "5566:5566"
    depends_on:
      - redis
      - celery_worker
    volumes:
      - ./recipes:/app/recipes
      - ./KitchenClip:/app/KitchenClip
      - ./templates:/app/templates
      - ./manage.py:/app/manage.py
      - ./db.sqlite3:/app/data/db.sqlite3
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    restart: unless-stopped
